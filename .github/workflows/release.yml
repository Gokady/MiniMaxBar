name: Manual Release

# ─── Layer 2:手动发版 → GitHub Releases MVP ──────────────
#
# 在 GitHub Actions 页面点 "Run workflow" → 输版本号 → 自动:
#   1. 校验版本号 + 改 Info.plist
#   2. 编译 .app(用 setup-swift 装的 6.2,绕开 build.sh)
#   3. 打 MiniMaxBar.zip + MiniMaxBar.dmg
#   4. 严格验证产物(zip 顶层结构 + 版本号 + 可执行文件)
#   5. 创建 GitHub Release,上传两个资产
#   6. 产物也作为 workflow artifact 留 30 天
#
# 暂不接:Sparkle / Apple Developer / Notarization

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号,格式 X.Y.Z(例:0.4.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes(可空,空则从 CHANGELOG.md 抽对应段)'
        required: false
        type: string
        default: ''

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false   # 发版严肃,别中途取消

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      # ad-hoc 签名:用户首次打开需要右键 → 打开
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: 校验输入
        id: validate
        env:
          VERSION: ${{ inputs.version }}
        run: |
          VERSION="${VERSION}"
          # X.Y.Z 格式校验
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ 版本号格式错: $VERSION(需要 X.Y.Z,如 0.4.0)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 版本号: v$VERSION"

      - name: 写 Info.plist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          VERSION="${VERSION}"
          PLIST="Resources/Info.plist"

          BUILD_NUM=$(git rev-list --count HEAD)
          echo "Build 号: $BUILD_NUM"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :MARKETING_VERSION string $VERSION" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :MARKETING_VERSION $VERSION" "$PLIST"

          echo "✅ Info.plist:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :MARKETING_VERSION" "$PLIST"

      - name: 编译 .app bundle(inline,绕开 build.sh 的 Xcode 6.1 硬编码)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -o pipefail

          # setup-swift@v2 已经把 swift 6.2 加到 PATH
          # (之前版本用自定义 find 找路径,失败因为 TOOLCHAINS 只是 symlink 名不是完整路径)
          # 这里跟 build.yml 一样直接用 swift 命令
          echo "=== Swift 版本 ==="
          swift --version

          # 编译
          swift build -c release 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ 编译失败,最后 50 行:"
            tail -50 build.log
            exit 1
          fi

          # 拼 .app bundle(等价 build.sh 后半段)
          BIN=".build/release/MiniMaxBar"
          APP="dist/MiniMaxBar.app"
          rm -rf dist
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/MiniMaxBar"
          cp Resources/Info.plist "$APP/Contents/Info.plist"

          if [ -f "Icons/AppIcon.icns" ]; then
            cp "Icons/AppIcon.icns" "$APP/Contents/Resources/AppIcon.icns"
            echo "  ✓ AppIcon.icns"
          fi
          for png in "icon_22.png" "icon_22@2x.png" "icon_22@3x.png"; do
            if [ -f "Icons/statusbar/$png" ]; then
              cp "Icons/statusbar/$png" "$APP/Contents/Resources/$png"
            fi
          done
          for png in "icon_22.png" "icon_22@2x.png" "icon_22@3x.png"; do
            if [ -f "Icons/statusbar/color/$png" ]; then
              mkdir -p "$APP/Contents/Resources/color"
              cp "Icons/statusbar/color/$png" "$APP/Contents/Resources/color/$png"
            fi
          done

          # ad-hoc 签名(用户首次打开 macOS 会弹警告,右键 → 打开 即可)
          codesign --force --deep --sign - "$APP" 2>/dev/null || true
          xattr -cr "$APP" 2>/dev/null || true

          echo "✅ .app bundle 完成"
          ls -la "$APP/"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist"

      - name: 打 MiniMaxBar.zip(顶层 MiniMaxBar.app/)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          cd dist

          # ditto --keepParent 让 MiniMaxBar.app 作为 zip 顶层目录
          ditto -c -k --sequesterRsrc --keepParent MiniMaxBar.app MiniMaxBar.zip
          ls -la MiniMaxBar.zip

          # ─── 严格验证 zip 结构(用户要求)───
          echo ""
          echo "───────── zip 结构验证 ─────────"
          rm -rf /tmp/zip-extract
          mkdir -p /tmp/zip-extract
          unzip -q MiniMaxBar.zip -d /tmp/zip-extract

          APP="/tmp/zip-extract/MiniMaxBar.app"
          ERRORS=0

          if [ ! -d "$APP" ]; then
            echo "❌ 顶层不是 MiniMaxBar.app/(实际是 $(ls /tmp/zip-extract | head -3 | tr '\n' ' '))"
            ERRORS=$((ERRORS + 1))
          fi

          if [ ! -f "$APP/Contents/Info.plist" ]; then
            echo "❌ MiniMaxBar.app/Contents/Info.plist 缺失"
            ERRORS=$((ERRORS + 1))
          fi

          if [ ! -f "$APP/Contents/MacOS/MiniMaxBar" ]; then
            echo "❌ MiniMaxBar.app/Contents/MacOS/MiniMaxBar 缺失"
            ERRORS=$((ERRORS + 1))
          fi

          if [ -f "$APP/Contents/Info.plist" ]; then
            APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")
            if [ "$APP_VERSION" != "$VERSION" ]; then
              echo "❌ 版本号不匹配:zip 里是 $APP_VERSION,输入是 $VERSION"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ CFBundleShortVersionString: $APP_VERSION(匹配)"
            fi
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "❌ zip 验证失败,$ERRORS 项错"
            exit 1
          fi
          echo "✅ zip 验证通过:顶层 MiniMaxBar.app/ + Info.plist + 可执行 + 版本号都对"

      - name: 打 MiniMaxBar.dmg(拖拽安装包,ad-hoc)
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e

          STAGING="dist/dmg-staging"
          rm -rf "$STAGING" dist/MiniMaxBar.dmg
          mkdir -p "$STAGING"

          # 拷 .app
          cp -R dist/MiniMaxBar.app "$STAGING/"

          # 加 Applications 软链接(标准拖拽安装)
          ln -s /Applications "$STAGING/Applications"

          # 创建只读压缩 DMG(UDZO)
          echo "───────── 创建 DMG ─────────"
          ls -la "$STAGING/"
          hdiutil create -volname "MiniMaxBar" \
                          -srcfolder "$STAGING" \
                          -ov -format UDZO \
                          "dist/MiniMaxBar.dmg"

          # 验证 DMG
          hdiutil verify dist/MiniMaxBar.dmg
          ls -la dist/MiniMaxBar.dmg
          echo "✅ DMG 已生成:$(du -h dist/MiniMaxBar.dmg | cut -f1)"

      - name: 读 release notes
        id: notes
        env:
          VERSION: ${{ inputs.version }}
          INPUT_NOTES: ${{ inputs.release_notes }}
        run: |
          VERSION="${VERSION}"

          if [ -n "${INPUT_NOTES}" ]; then
            NOTES="${INPUT_NOTES}"
            echo "📝 用 workflow 输入的 notes"
          elif [ -f CHANGELOG.md ] && grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            NOTES=$(awk -v ver="## \[${VERSION}\]" '
              $0 ~ ver { in_section=1; print; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md)
            echo "📝 从 CHANGELOG.md 抽 ${VERSION} 段"
          else
            NOTES="Release v${VERSION}"
            echo "📝 CHANGELOG.md 没有 ${VERSION} 段,用默认文案"
          fi

          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "───────── notes preview ─────────"
          echo "$NOTES" | head -20

      - name: 创建 GitHub Release(zip + dmg)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          VERSION="${VERSION}"
          ZIP="dist/MiniMaxBar.zip"
          DMG="dist/MiniMaxBar.dmg"

          ASSETS=()
          [ -f "$ZIP" ] && ASSETS+=("$ZIP")
          [ -f "$DMG" ] && ASSETS+=("$DMG")

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "❌ 没产物可上传"
            exit 1
          fi

          echo "📦 准备上传 ${#ASSETS[@]} 个资产:"
          printf '  - %s\n' "${ASSETS[@]}"

          gh release create "v${VERSION}" \
            "${ASSETS[@]}" \
            --title "v${VERSION}" \
            --notes "${{ steps.notes.outputs.notes }}"

          echo ""
          echo "🎉 Release v${VERSION} 已发布"
          echo "👉 https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          echo ""
          echo "💡 用户下载提示:"
          echo "  - 首次打开 macOS 会弹'未识别的开发者',右键 → 打开 即可"
          echo "  - 拖拽 MiniMaxBar.app 到 /Applications 完成安装"

      - name: 上传产物(作为 workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: MiniMaxBar-v${{ inputs.version }}-build
          path: |
            dist/MiniMaxBar.zip
            dist/MiniMaxBar.dmg
          if-no-files-found: error
          retention-days: 30
